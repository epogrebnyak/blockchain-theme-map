# Subtitle: Core building blocks of blockchain systems

# Card 2. Transactions

Transactions:
  _orientation: horizontal
  Create:
    - Native issuance (block rewards, staking and validation)
    - Token minting
    - Airdrops and rewards

  Acquire:
