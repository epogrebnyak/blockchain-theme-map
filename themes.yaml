    - Token supply and burn

# Card 5. Chains and ecosystems
Networks:
  _orientation: horizontal
  items:
    - Bitcoin (BTC)
    - Ethereum (ETH)
    - L2 and L3 Rollups
    - Alternative L1s (BNB, Solana, Tron)
